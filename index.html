<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Legend of Script: Built-in Assets</title>
    <style>
        body { 
            margin: 0; background: #0e1a0e; color: white; 
            font-family: 'Tahoma', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #game-container { position: relative; border: 6px solid #3d251e; box-shadow: 0 0 40px #000; }
        canvas { background: #3a5a2a; display: block; image-rendering: pixelated; }
        #ui { 
            width: 600px; padding: 12px; display: flex; justify-content: space-between; 
            background: #2a1a14; border: 6px solid #3d251e; border-bottom: none;
            box-sizing: border-box; font-weight: bold; text-transform: uppercase;
        }
        .heart { color: #ff4d4d; filter: drop-shadow(0 0 2px black); }
        .controls { position: absolute; bottom: -60px; color: #a3a3a3; font-size: 13px; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div id="ui">
    <div id="health">HP: <span class="heart">❤❤❤</span></div>
    <div id="inventory">GEMS: <span id="gems" style="color:#00ffcc">0</span></div>
    <div id="room-name" style="color: #edcc61;">Stone Path</div>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="controls">ARROWS: Move | SPACE: Attack | R: Respawn</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- PROCEDURAL SPRITE GENERATORS ---
    // This creates images in-memory so no external links are needed
    function createHelperCanvas(w, h, drawFunc) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const tempCtx = c.getContext('2d');
        drawFunc(tempCtx);
        return c;
    }

    const sprites = {
        grass: createHelperCanvas(32, 32, (c) => {
            c.fillStyle = '#3a5a2a'; c.fillRect(0,0,32,32);
            c.fillStyle = '#2d4620'; c.fillRect(4,8,2,2); c.fillRect(20,24,2,2);
        }),
        player: createHelperCanvas(32, 32, (c) => {
            c.fillStyle = '#d4a373'; c.fillRect(8,4,16,12); // Head
            c.fillStyle = '#34495e'; c.fillRect(6,16,20,12); // Body
            c.fillStyle = '#f1c40f'; c.fillRect(10,8,4,4); c.fillRect(18,8,4,4); // Eyes
        }),
        slime: createHelperCanvas(32, 32, (c) => {
            c.fillStyle = '#2ecc71'; c.beginPath(); c.arc(16,20,10,0,Math.PI,true); c.fill();
            c.fillRect(6,20,20,8);
            c.fillStyle = 'white'; c.fillRect(10,18,4,4); c.fillRect(18,18,4,4);
        }),
        gem: createHelperCanvas(16, 16, (c) => {
            c.fillStyle = '#00ffcc'; c.beginPath();
            c.moveTo(8,0); c.lineTo(16,8); c.lineTo(8,16); c.lineTo(0,8); c.fill();
        })
    };

    // --- GAME STATE ---
    let gameActive = true;
    let player = {
        x: 300, y: 200, w: 32, h: 32,
        speed: 4, hp: 3, gems: 0,
        dir: 'down', isAttacking: false,
        attackFrame: 0, invuln: 0
    };

    let enemies = [];
    let drops = [];

    function spawnEnemies() {
        enemies = [];
        for(let i = 0; i < 4; i++) {
            enemies.push({
                x: Math.random() * 500 + 50, y: Math.random() * 300 + 50,
                w: 32, h: 32, hp: 2, speed: 1.5,
                vx: Math.random() - 0.5, vy: Math.random() - 0.5
            });
        }
    }

    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function update() {
        if(!gameActive) {
            if(keys['KeyR']) location.reload();
            return;
        }

        // Movement
        if (!player.isAttacking) {
            if (keys['ArrowUp']) { player.y -= player.speed; player.dir = 'up'; }
            else if (keys['ArrowDown']) { player.y += player.speed; player.dir = 'down'; }
            else if (keys['ArrowLeft']) { player.x -= player.speed; player.dir = 'left'; }
            else if (keys['ArrowRight']) { player.x += player.speed; player.dir = 'right'; }
        }

        // Attack Logic
        if (keys['Space'] && !player.isAttacking) {
            player.isAttacking = true;
            player.attackFrame = 15;
        }
        if (player.attackFrame > 0) player.attackFrame--;
        else player.isAttacking = false;

        // Enemy Logic
        enemies.forEach((en, i) => {
            en.x += en.vx * en.speed;
            en.y += en.vy * en.speed;
            if(en.x < 0 || en.x > 568) en.vx *= -1;
            if(en.y < 0 || en.y > 368) en.vy *= -1;

            // Hit enemy
            if(player.isAttacking && player.attackFrame > 5) {
                let s = { x: player.x, y: player.y, w: 40, h: 40 };
                if(player.dir === 'up') s.y -= 30;
                if(player.dir === 'down') s.y += 30;
                if(player.dir === 'left') s.x -= 30;
                if(player.dir === 'right') s.x += 30;

                if(en.x < s.x + s.w && en.x + en.w > s.x && en.y < s.y + s.h && en.y + en.h > s.y) {
                    en.hp--;
                    en.x += en.vx * -20; 
                    if(en.hp <= 0) {
                        drops.push({x: en.x, y: en.y});
                        enemies.splice(i, 1);
                    }
                }
            }

            // Hit player
            if(en.x < player.x + 20 && en.x + 20 > player.x && en.y < player.y + 20 && en.y + 20 > player.y && player.invuln <= 0) {
                player.hp--;
                player.invuln = 60;
                updateUI();
            }
        });

        // Collection
        drops.forEach((d, i) => {
            if(Math.abs(player.x - d.x) < 20 && Math.abs(player.y - d.y) < 20) {
                player.gems += 10;
                drops.splice(i, 1);
                updateUI();
            }
        });

        if(player.invuln > 0) player.invuln--;
        if(player.hp <= 0) gameActive = false;
    }

    function updateUI() {
        document.getElementById('gems').innerText = player.gems;
        document.getElementById('health').innerHTML = `HP: <span class="heart">${"❤".repeat(Math.max(0, player.hp))}</span>`;
    }

    function draw() {
        // Tiles
        for(let x=0; x<600; x+=32) {
            for(let y=0; y<400; y+=32) {
                ctx.drawImage(sprites.grass, x, y);
            }
        }

        drops.forEach(d => ctx.drawImage(sprites.gem, d.x, d.y));
        enemies.forEach(en => ctx.drawImage(sprites.slime, en.x, en.y));

        // Draw Player
        if(player.invuln % 10 < 5) {
            ctx.save();
            ctx.translate(player.x + 16, player.y + 16);
            if(player.dir === 'left') ctx.scale(-1, 1); // Flip sprite for left
            ctx.drawImage(sprites.player, -16, -16);
            ctx.restore();
        }

        // Draw Slash
        if(player.isAttacking) {
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            let sx = player.x, sy = player.y;
            if(player.dir === 'up') sy -= 25;
            if(player.dir === 'down') sy += 25;
            if(player.dir === 'left') sx -= 25;
            if(player.dir === 'right') sx += 25;
            ctx.fillRect(sx+8, sy+8, 16, 16);
        }

        if(!gameActive) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0,0,600,400);
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER - PRESS R", 300, 200);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    spawnEnemies();
    loop();
</script>
</body>
</html>
