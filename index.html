<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Legend of Script: Pixel Edition</title>
    <style>
        body { 
            margin: 0; background: #0e1a0e; color: white; 
            font-family: 'Tahoma', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        #game-container { position: relative; border: 6px solid #3d251e; box-shadow: 0 0 40px #000; }
        canvas { background: #3a5a2a; display: block; image-rendering: pixelated; }
        #ui { 
            width: 600px; padding: 12px; display: flex; justify-content: space-between; 
            background: #2a1a14; border: 6px solid #3d251e; border-bottom: none;
            box-sizing: border-box; font-weight: bold; text-transform: uppercase;
        }
        .heart { color: #ff4d4d; filter: drop-shadow(0 0 2px black); }
        .controls { position: absolute; bottom: -60px; color: #a3a3a3; font-size: 13px; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div id="ui">
    <div id="health">HP: <span class="heart">❤❤❤</span></div>
    <div id="inventory">GEMS: <span id="gems" style="color:#00ffcc">0</span></div>
    <div id="room-name" style="color: #edcc61;">Mystic Woods</div>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="controls">ARROWS: Move | SPACE: Attack | R: Respawn</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // --- ASSET LOADING ---
    const assets = {
        player: 'https://i.imgur.com/39p2M9A.png', // Pixel Knight
        slime: 'https://i.imgur.com/D4IByaL.png',  // Green Slime
        gem: 'https://i.imgur.com/S6pPAtS.png',    // Cyan Gem
        grass: 'https://i.imgur.com/uR2K1D3.png',  // Grass Tile
        slash: 'https://i.imgur.com/9v6AUnH.png'   // Slash FX
    };

    const images = {};
    let loadedImages = 0;
    const totalImages = Object.keys(assets).length;

    for (let key in assets) {
        images[key] = new Image();
        images[key].src = assets[key];
        images[key].onload = () => {
            loadedImages++;
            if (loadedImages === totalImages) loop();
        };
    }

    // --- GAME STATE ---
    let gameActive = true;
    let frame = 0;
    let player = {
        x: 300, y: 200, w: 32, h: 48,
        speed: 4, hp: 3, gems: 0,
        dir: 'down', isAttacking: false,
        attackFrame: 0, invuln: 0
    };

    let enemies = [];
    let drops = [];

    function spawnEnemies() {
        enemies = [];
        for(let i = 0; i < 4; i++) {
            enemies.push({
                x: Math.random() * (canvas.width - 60) + 30,
                y: Math.random() * (canvas.height - 60) + 30,
                w: 32, h: 32, hp: 2,
                speed: 1 + Math.random(),
                dirX: Math.random() > 0.5 ? 1 : -1,
                dirY: Math.random() > 0.5 ? 1 : -1,
                timer: 0
            });
        }
    }

    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function checkCollision(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function update() {
        if(!gameActive) {
            if(keys['KeyR']) location.reload();
            return;
        }

        // Movement
        if (!player.isAttacking) {
            let moving = false;
            if (keys['ArrowUp']) { player.y -= player.speed; player.dir = 'up'; moving = true; }
            if (keys['ArrowDown']) { player.y += player.speed; player.dir = 'down'; moving = true; }
            if (keys['ArrowLeft']) { player.x -= player.speed; player.dir = 'left'; moving = true; }
            if (keys['ArrowRight']) { player.x += player.speed; player.dir = 'right'; moving = true; }
        }

        // Attack Logic
        if (keys['Space'] && !player.isAttacking) {
            player.isAttacking = true;
            player.attackFrame = 12;
        }
        if (player.attackFrame > 0) player.attackFrame--;
        else player.isAttacking = false;

        // Screen Bounds & Transitions
        if (player.x < -10 || player.x > canvas.width || player.y < -10 || player.y > canvas.height) {
            player.x = 300; player.y = 200;
            spawnEnemies();
            drops = [];
        }

        // Enemy AI
        enemies.forEach((en, index) => {
            if(en.timer <= 0) {
                en.dirX = (Math.random() - 0.5) * 2;
                en.dirY = (Math.random() - 0.5) * 2;
                en.timer = 50 + Math.random() * 50;
            }
            en.x += en.dirX * en.speed;
            en.y += en.dirY * en.speed;
            en.timer--;

            if(en.x < 0 || en.x > canvas.width - en.w) en.dirX *= -1;
            if(en.y < 0 || en.y > canvas.height - en.h) en.dirY *= -1;

            // Combat
            if(player.isAttacking) {
                let s = { x: player.x, y: player.y, w: 40, h: 40 };
                if(player.dir === 'up') s.y -= 35;
                if(player.dir === 'down') s.y += 35;
                if(player.dir === 'left') s.x -= 35;
                if(player.dir === 'right') s.x += 35;

                if(checkCollision(s, en)) {
                    en.hp -= 0.1; // Rapid slash damage
                    en.x += en.dirX * -10; // Knockback
                }
            }

            if(checkCollision(player, en) && player.invuln <= 0) {
                player.hp--;
                player.invuln = 60;
                updateUI();
            }

            if(en.hp <= 0) {
                drops.push({x: en.x, y: en.y, w: 20, h: 20});
                enemies.splice(index, 1);
            }
        });

        // Collection
        drops.forEach((d, i) => {
            if(checkCollision(player, d)) {
                player.gems += 10;
                drops.splice(i, 1);
                updateUI();
            }
        });

        if(player.invuln > 0) player.invuln--;
        if(player.hp <= 0) gameActive = false;
        frame++;
    }

    function updateUI() {
        document.getElementById('gems').innerText = player.gems;
        let h = "";
        for(let i=0; i<player.hp; i++) h += "❤";
        document.getElementById('health').innerHTML = `HP: <span class="heart">${h}</span>`;
    }

    function draw() {
        // Draw Grass Background (Tiled)
        for(let i=0; i<canvas.width; i+=64) {
            for(let j=0; j<canvas.height; j+=64) {
                ctx.drawImage(images.grass, i, j, 64, 64);
            }
        }

        // Draw Gems
        drops.forEach(d => ctx.drawImage(images.gem, d.x, d.y, 24, 24));

        // Draw Enemies
        enemies.forEach(en => ctx.drawImage(images.slime, en.x, en.y, 32, 32));

        // Draw Player with flicker if hurt
        if(player.invuln % 10 < 5) {
            // Simple logic to flip player sprite could go here, but using base sprite for now
            ctx.drawImage(images.player, player.x, player.y, player.w, player.h);
        }

        // Draw Sword Attack
        if(player.isAttacking) {
            ctx.save();
            let sx = player.x + 16, sy = player.y + 24;
            let rot = 0;
            if(player.dir === 'up') { sy -= 40; rot = -Math.PI/2; }
            if(player.dir === 'down') { sy += 40; rot = Math.PI/2; }
            if(player.dir === 'left') { sx -= 40; rot = Math.PI; }
            if(player.dir === 'right') { sx += 40; rot = 0; }
            
            ctx.translate(sx, sy);
            ctx.rotate(rot);
            ctx.drawImage(images.slash, -20, -20, 40, 40);
            ctx.restore();
        }

        if(!gameActive) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#ff4d4d";
            ctx.font = "bold 40px Tahoma";
            ctx.textAlign = "center";
            ctx.fillText("YOU PERISHED", canvas.width/2, 200);
            ctx.font = "20px Tahoma";
            ctx.fillStyle = "white";
            ctx.fillText("Press R to Rebirth", canvas.width/2, 240);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    spawnEnemies();
</script>
</body>
</html>
